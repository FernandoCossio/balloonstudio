version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ballonstudio-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-decoraciones}
    ports:
      - "${DB_PORT_OUT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - ballonnetwork

  redis:
    image: redis:7-alpine
    container_name: ballonstudio-redis
    restart: always
    ports:
      - "${REDIS_PORT_OUT:-6379}:6379"
    volumes:
      - redisdata:/data
    networks:
      - ballonnetwork

  backend:
    build:
      context: ./backend/ms-decoraciones
      dockerfile: Dockerfile
    container_name: ballonstudio-backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/decoraciones}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_IA_URL: http://ia:8000
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:4000}
      BASE_STORAGE_PATH: ${BASE_STORAGE_PATH:-/app}
      APP_UPLOAD_DIR: ${APP_UPLOAD_DIR:-/app/uploads}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost/api}
      RESEND_API_KEY: ${RESEND_API_KEY:-re_123456789}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      APP_RESERVA_LOCK_TTL_MINUTES: ${APP_RESERVA_LOCK_TTL_MINUTES:-15}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:4200}
      PAGOFACIL_BASE_URL: ${PAGOFACIL_BASE_URL}
      PAGOFACIL_TOKEN_SERVICE: ${PAGOFACIL_TOKEN_SERVICE}
      PAGOFACIL_TOKEN_SECRET: ${PAGOFACIL_TOKEN_SECRET}
      PAGOFACIL_CALLBACK_URL: ${PAGOFACIL_CALLBACK_URL}
      PAGOFACIL_TEST_MODE_ENABLED: ${PAGOFACIL_TEST_MODE_ENABLED}
      PAGOFACIL_TEST_MODE_MONTO_SIMULADO: ${PAGOFACIL_TEST_MODE_MONTO_SIMULADO}
    ports:
      - "${BACKEND_PORT_OUT:-8080}:8080"
    volumes:
      - uploads-data:${APP_UPLOAD_DIR:-/app/uploads}
    networks:
      - ballonnetwork

  ia:
    build:
      context: ./backend/ms-ia
      dockerfile: Dockerfile
    container_name: ballonstudio-ia
    restart: always
    depends_on:
      - db
      - redis
    environment:
      CLIP_IMAGE_MODEL: openai/clip-vit-base-patch32
      CLIP_TEXT_MODEL: sentence-transformers/clip-ViT-B-32-multilingual-v1
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-decoraciones}
      BACKEND_BASE_URL: http://backend:8080/api
      REDIS_IA_HOST: redis
      REDIS_IA_PORT: 6379
      REDIS_IA_DB: 0
      REDIS_CHANNEL_PENDING: ia:embedding:pending
      REDIS_CHANNEL_RESULT: ia:embedding:result
      PORT: 8000
    ports:
      - "${IA_PORT_OUT:-8003}:8000"
    networks:
      - ballonnetwork

  frontend:
    build:
      context: ./frontend/ballonstudio
      dockerfile: Dockerfile
    container_name: ballonstudio-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT_OUT:-80}:80"
    networks:
      - ballonnetwork

volumes:
  pgdata:
  redisdata:
  uploads-data:

networks:
  ballonnetwork:
    driver: bridge
