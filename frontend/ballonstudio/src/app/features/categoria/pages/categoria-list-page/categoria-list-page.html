<p-toast />
<p-confirmDialog />
<div class="emp-page">
    <!-- Header Section -->
    <div class="emp-header">
        <div class="emp-header__text">
            <h1 class="emp-header__title">Gestión de Categorías</h1>
            <p class="emp-header__sub">Administra las categorías de artículos de inventario de Balloon Studio.</p>
        </div>
        <div class="emp-header__actions">
            <p-button 
                label="Nueva Categoría" 
                icon="pi pi-plus" 
                styleClass="emp-btn-primary" 
                (onClick)="openNew()"
            ></p-button>
        </div>
    </div>
    <!-- Table Section -->
    <div class="card p-4">
        <p-table 
            [value]="categorias" 
            [loading]="loading" 
            [paginator]="true" 
            [rows]="10" 
            responsiveLayout="scroll"
            styleClass="p-datatable-striped"
        >
            <ng-template pTemplate="header">
                <tr>
                    <th style="width: 45%">Nombre</th>
                    <th style="width: 30%">Descripción</th>
                    <th style="width: 15%; text-align: center">Acciones</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-cat>
                <tr>
                    <td class="font-semibold">{{ cat['nombre'] }}</td>
                    <td>{{ cat['descripcion'] || 'Sin descripción' }}</td>
                    <td style="text-align: center">
                        <div class="flex justify-center gap-2">
                            <p-button 
                                icon="pi pi-pencil" 
                                styleClass="p-button-rounded p-button-success p-button-text" 
                                (onClick)="editCategoria(cat)"
                                pTooltip="Editar"
                            ></p-button>
                            <p-button 
                                icon="pi pi-trash" 
                                styleClass="p-button-rounded p-button-danger p-button-text" 
                                (onClick)="deleteCategoria(cat)"
                                pTooltip="Eliminar"
                            ></p-button>
                        </div>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="4" class="text-center py-4">No se encontraron categorías registradas.</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
<!-- Modal Create / Edit -->
<app-categoria-create-edit-dialog 
    [(visible)]="dialogVisible" 
    [categoria]="selectedCategoria" 
    (saved)="loadCategorias()"
/>
