<div class="design-layout">

  <!-- Sidebar izquierdo -->
  <app-catalogo-sidebar
    cdkDropList
    id="catalogo-list"
    [cdkDropListConnectedTo]="['canvas-drop-zone']"
  />

  <!-- Canvas central -->
  <div
    class="canvas-wrapper"
    cdkDropList
    id="canvas-drop-zone"
    [cdkDropListConnectedTo]="['catalogo-list']"
    [cdkDropListEnterPredicate]="() => true"
    (cdkDropListDropped)="onArticuloDrop($event)"
  >
    <!-- Toolbar con nombre del proyecto y acciones -->
    <div class="canvas-toolbar">
      <span class="canvas-toolbar__title">
        {{ canvasState.proyectoActual()?.nombre ?? 'Canvas de diseño' }}
      </span>
      <div class="canvas-toolbar__actions">
        @if (canvasState.selectedId()) {
          <button (click)="canvasState.bringToFront(canvasState.selectedId()!)">
            Traer al frente
          </button>
          <button (click)="canvasState.sendToBack(canvasState.selectedId()!)">
            Enviar al fondo
          </button>
        }
        <p-button
          label="Guardar"
          icon="pi pi-save"
          [loading]="guardando()"
          [disabled]="!canvasState.proyectoActual()"
          (onClick)="guardarCanvas()"
        />
        <p-button
          label="Exportar PNG"
          icon="pi pi-image"
          severity="secondary"
          (onClick)="exportPNG()"
        />
      </div>
    </div>

    <!-- Tabs de escenarios -->
    <app-escenario-tabs (escenarioCambiado)="onEscenarioCambiado($event)"/>

    <ko-stage
      #stageRef
      [config]="stageConfig()"
      (click)="onStageClick($event)"
    >
      <!-- Layer 0: imagen de fondo del escenario -->
      <ko-layer>
        <ko-image [config]="backgroundConfig()"/>
      </ko-layer>

      <!-- Layer 1: objetos de fondo -->
      <ko-layer>
        @for (item of canvasState.midItems(); track item.instanceId) {
          <ko-image
            [config]="getImageConfig(item)"
            (click)="onItemClick($event, item.instanceId)"
            (dragend)="onDragEnd($event, item.instanceId)"
          />
        }
      </ko-layer>

      <!-- Layer 2: objetos principales + transformer -->
      <ko-layer>
        @for (item of canvasState.mainItems(); track item.instanceId) {
          <ko-image
            [config]="getImageConfig(item)"
            (click)="onItemClick($event, item.instanceId)"
            (dragend)="onDragEnd($event, item.instanceId)"
          />
        }
        <ko-transformer #transformerRef/>
      </ko-layer>

    </ko-stage>
  </div>

  <!-- Panel derecho -->
  <app-pricing-panel/>

  <p-toast/>
</div>
