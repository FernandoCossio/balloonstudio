<p-toast></p-toast>
<div class="bs-login">
    <section class="bs-brand">
        <div class="bs-brand__inner">
            <div class="bs-brand__avatar">
                <i class="pi pi-sparkles"></i>
            </div>

            <h1 class="bs-title">Crea momentos mágicos.</h1>
            <p class="bs-tagline">
                Únete a la comunidad de Balloon Studio y transforma cualquier espacio en una celebración inolvidable.
            </p>
        </div>
    </section>

    <section class="bs-form">
        <div class="bs-form__outer">
            <div class="bs-form__container">
                <div class="bs-form__brand">
                    <div class="bs-form__brand-icon">
                        <i class="pi pi-sparkles"></i>
                    </div>
                    <div class="bs-form__brand-text">BalloonStudio</div>
                </div>

                <div class="bs-form__header">
                    <div class="bs-form__title">Crear una cuenta</div>
                    <div class="bs-subtitle">Empieza a planificar tu próximo evento espectacular hoy mismo.</div>
                </div>

                <div class="bs-form__fields">
                    <div class="bs-form__field">
                        <label class="bs-label" for="nombre">Nombre Completo</label>
                        <p-inputgroup>
                            <p-inputgroup-addon>
                                <i class="pi pi-user"></i>
                            </p-inputgroup-addon>
                            <input pInputText id="nombre" name="nombre" type="text" placeholder="Ej. Ana García" [(ngModel)]="nombre" />
                        </p-inputgroup>
                    </div>

                    <div class="bs-form__field">
                        <label class="bs-label" for="email">Correo Electrónico</label>
                        <p-inputgroup>
                            <p-inputgroup-addon>
                                <i class="pi pi-envelope"></i>
                            </p-inputgroup-addon>
                            <input pInputText id="email" name="email" type="email" placeholder="ana@ejemplo.com" [(ngModel)]="email" />
                        </p-inputgroup>
                    </div>

                    <div class="bs-form__field">
                        <label class="bs-label" for="telefono">Teléfono</label>
                        <p-inputgroup>
                            <p-inputgroup-addon>
                                <i class="pi pi-phone"></i>
                            </p-inputgroup-addon>
                            <input pInputText id="telefono" name="telefono" type="text" placeholder="+591 000 000 000" [(ngModel)]="telefono" />
                        </p-inputgroup>
                    </div>

                    <!-- <div class="bs-form__field">
                        <label class="bs-label" for="password">Contraseña</label>
                        <p-inputgroup>
                            <p-inputgroup-addon>
                                <i class="pi pi-lock"></i>
                            </p-inputgroup-addon>
                            <input pInputText id="password" name="password" [type]="passwordVisible ? 'text' : 'password'" placeholder="Crea una contraseña" [(ngModel)]="password" />
                            <p-inputgroup-addon>
                                <p-button type="button" [text]="true" [rounded]="true" severity="secondary" [icon]="passwordVisible ? 'pi pi-eye-slash' : 'pi pi-eye'" (onClick)="togglePasswordVisible()" />
                            </p-inputgroup-addon>
                        </p-inputgroup>
                    </div> -->

                    <div class="bs-form__terms">
                        <p-checkbox [(ngModel)]="acceptTerms" name="acceptTerms" inputId="acceptTerms" [binary]="true" />
                        <label class="bs-terms" for="acceptTerms">
                            Acepto los <span class="bs-link">Términos y Condiciones</span> y la <span class="bs-link">Política de Privacidad</span> de Balloon Studio.
                        </label>
                    </div>

                    <p-button label="REGISTRARME AHORA" styleClass="w-full" (onClick)="onRegister()" [loading]="isLoading" />

                    <div class="bs-separator">
                        <div class="bs-separator-line"></div>
                        <div class="bs-separator-text">O REGÍSTRATE CON</div>
                        <div class="bs-separator-line"></div>
                    </div>

                    <div class="bs-form__providers">
                        <p-button [outlined]="true" label="Google" icon="pi pi-google" />
                        <p-button [outlined]="true" label="Apple" icon="pi pi-apple" />
                    </div>

                    <div class="bs-form__footer">
                        <span class="bs-form__footer-muted">¿Ya tienes una cuenta? </span>
                        <span class="bs-link" routerLink="/auth/login">Inicia sesión aquí</span>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
